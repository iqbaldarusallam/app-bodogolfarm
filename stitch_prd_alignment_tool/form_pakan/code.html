<body class="bg-surface-muted min-h-screen font-body-md text-on-surface selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Top AppBar (from JSON guidance - modified for Back action focus) -->
<header class="bg-surface flex justify-between items-center px-gutter h-16 w-full max-w-7xl mx-auto fixed top-0 z-40 transition-colors">
<div class="flex items-center gap-md">
<button class="hover:bg-surface-container-low transition-colors p-2 rounded-full active:scale-95">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<div class="flex flex-col">
<h1 class="text-headline-sm font-headline-sm text-primary">Catat Pakan</h1>
<p class="text-caption font-caption text-on-surface-variant">#A-012 · 25 Jun 2026</p>
</div>
</div>
<div class="flex items-center gap-md">
<span class="text-id-monospace font-id-monospace text-primary-container bg-primary-fixed px-2 py-1 rounded">ID: 012</span>
</div>
</header>
<main class="pt-24 pb-32 px-gutter max-w-2xl mx-auto space-y-lg">
<!-- Quick Stats Glassmorphism Card -->
<div class="bg-white/80 backdrop-blur-md p-lg rounded-xl shadow-sm border border-white flex justify-between items-center">
<div class="space-y-1">
<p class="text-caption font-caption text-on-surface-variant uppercase tracking-wider">Bobot Terakhir</p>
<div class="flex items-baseline gap-xs">
<span class="text-headline-lg font-headline-lg text-on-surface">450.5</span>
<span class="text-body-md font-body-md text-on-surface-variant">kg</span>
</div>
</div>
<div class="h-10 w-px bg-outline-variant"></div>
<div class="space-y-1 text-right">
<p class="text-caption font-caption text-on-surface-variant uppercase tracking-wider">Target DMI</p>
<div class="flex items-baseline gap-xs justify-end">
<span class="text-headline-lg font-headline-lg text-primary">13.5</span>
<span class="text-body-md font-body-md text-on-surface-variant">kg</span>
</div>
</div>
</div>
<!-- Feeding Form Section -->
<section class="bg-surface-container-lowest p-lg rounded-xl shadow-sm space-y-xl">
<!-- Waktu Pemberian -->
<div class="space-y-md">
<label class="text-label-md font-label-md text-on-surface-variant">Waktu Pemberian</label>
<div class="flex gap-sm">
<button class="flex-1 py-3 px-4 rounded-lg bg-surface-container text-on-surface-variant font-label-md transition-all active:scale-95 border border-transparent hover:border-outline-variant pill-active" onclick="togglePill(this)" type="button">Pagi</button>
<button class="flex-1 py-3 px-4 rounded-lg bg-surface-container text-on-surface-variant font-label-md transition-all active:scale-95 border border-transparent hover:border-outline-variant" onclick="togglePill(this)" type="button">Siang</button>
<button class="flex-1 py-3 px-4 rounded-lg bg-surface-container text-on-surface-variant font-label-md transition-all active:scale-95 border border-transparent hover:border-outline-variant" onclick="togglePill(this)" type="button">Sore</button>
</div>
</div>
<!-- Jenis Pakan (Searchable Dropdown Mock) -->
<div class="space-y-md relative">
<label class="text-label-md font-label-md text-on-surface-variant">Jenis Pakan</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">search</span>
<input class="w-full pl-12 pr-12 py-4 rounded-xl border border-outline-variant focus:ring-2 focus:ring-primary focus:border-primary transition-all text-body-lg font-body-lg bg-white" placeholder="Cari atau pilih pakan..." type="text" value="Mix Konsentrat A-1"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline group-hover:text-primary cursor-pointer">expand_more</span>
</div>
</div>
<!-- Numeric Inputs Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
<div class="space-y-md">
<label class="text-label-md font-label-md text-on-surface-variant">Jumlah Diberikan</label>
<div class="relative">
<input class="w-full py-4 px-4 rounded-xl border border-outline-variant focus:ring-2 focus:ring-primary focus:border-primary transition-all text-headline-md font-headline-md bg-white pr-12" id="input_given" oninput="calculateDMI()" placeholder="0.0" step="0.1" type="number"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 text-body-md font-body-md text-outline">kg</span>
</div>
</div>
<div class="space-y-md">
<label class="text-label-md font-label-md text-on-surface-variant">Estimasi Konsumsi</label>
<div class="relative">
<input class="w-full py-4 px-4 rounded-xl border border-outline-variant focus:ring-2 focus:ring-primary focus:border-primary transition-all text-headline-md font-headline-md bg-white pr-12" id="input_consumed" oninput="calculateDMI()" placeholder="0.0" step="0.1" type="number"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 text-body-md font-body-md text-outline">kg</span>
</div>
</div>
</div>

<div class="bg-brand-surface p-md rounded-xl border border-brand-light flex items-center justify-between">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">analytics</span>
<span class="text-body-md font-body-md text-primary-container">DMI Aktual (Estimasi)</span>

<label class="text-label-md font-label-md text-on-surface-variant">Respons Nafsu Makan</label>
<div class="flex flex-wrap gap-sm">
<button class="px-5 py-3 rounded-full border border-outline-variant text-body-md font-body-md hover:bg-surface-container transition-all flex items-center gap-xs pill-active" onclick="toggleResponse(this, 'status-active')" type="button">
<span class="w-2 h-2 rounded-full bg-white"></span> Normal
                    </button>
<button class="px-5 py-3 rounded-full border border-outline-variant text-body-md font-body-md hover:bg-surface-container transition-all flex items-center gap-xs" onclick="toggleResponse(this, 'status-sick')" type="button">
<span class="w-2 h-2 rounded-full bg-status-sick"></span> Berkurang
                    </button>
<button class="px-5 py-3 rounded-full border border-outline-variant text-body-md font-body-md hover:bg-surface-container transition-all flex items-center gap-xs" onclick="toggleResponse(this, 'status-quarantine')" type="button">
<span class="w-2 h-2 rounded-full bg-status-quarantine"></span> Menolak
                    </button>
</div>
</div>
<!-- Catatan -->
<div class="space-y-md">
<label class="text-label-md font-label-md text-on-surface-variant">Catatan Tambahan</label>
<textarea class="w-full p-4 rounded-xl border border-outline-variant focus:ring-2 focus:ring-primary focus:border-primary transition-all text-body-md font-body-md bg-white resize-none" placeholder="Contoh: Sisa pakan agak basah, nafsu makan stabil..." rows="3"></textarea>
</div>
</section>
<!-- Previous Logs Preview (Mini Bento) -->
<div class="grid grid-cols-2 gap-md">
<div class="bg-surface-container p-md rounded-xl space-y-xs">
<p class="text-caption font-caption text-on-surface-variant">Kemarin Sore</p>
<p class="text-body-md font-bold text-on-surface">12.5 kg Konsentrat</p>
<div class="flex items-center gap-xs text-status-active">
<span class="material-symbols-outlined text-[14px]">check_circle</span>
<span class="text-caption">Habis</span>
</div>
</div>
<div class="bg-surface-container p-md rounded-xl space-y-xs">
<p class="text-caption font-caption text-on-surface-variant">Kemarin Siang</p>
<p class="text-body-md font-bold text-on-surface">10.0 kg Hijauan</p>
<div class="flex items-center gap-xs text-status-sick">
<span class="material-symbols-outlined text-[14px]">info</span>
<span class="text-caption">Sisa 1.2kg</span>
</div>
</div>
</div>
</main>
<!-- Bottom Action Bar (Fixed) -->
<div class="fixed bottom-0 left-0 w-full bg-surface-container-lowest px-gutter py-md border-t border-outline-variant/30 flex gap-md max-w-7xl mx-auto left-1/2 -translate-x-1/2 z-50 shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
<button class="flex-1 h-12 rounded-xl bg-primary text-on-primary font-headline-sm shadow-lg hover:brightness-110 active:scale-95 transition-all flex items-center justify-center gap-sm">
<span class="material-symbols-outlined">save</span>
            Simpan Record
        </button>
</div>
<script>
        function togglePill(element) {
            const container = element.parentElement;
            container.querySelectorAll('button').forEach(btn => {
                btn.classList.remove('pill-active');
            });
            element.classList.add('pill-active');
        }

        function toggleResponse(element, colorClass) {
            const container = element.parentElement;
            container.querySelectorAll('button').forEach(btn => {
                btn.classList.remove('pill-active');
                // Reset dot colors if needed
                const dot = btn.querySelector('span');
                if (btn.innerText.includes('Normal')) dot.className = "w-2 h-2 rounded-full bg-status-active";
                if (btn.innerText.includes('Berkurang')) dot.className = "w-2 h-2 rounded-full bg-status-sick";
                if (btn.innerText.includes('Menolak')) dot.className = "w-2 h-2 rounded-full bg-status-quarantine";
            });
            element.classList.add('pill-active');
            // Make dot white on active
            element.querySelector('span').className = "w-2 h-2 rounded-full bg-white";
        }

        function calculateDMI() {
            const weight = 450.5; // From UI mock
            const consumed = parseFloat(document.getElementById('input_consumed').value) || 0;
            const resultElement = document.getElementById('dmi_result');
            
            if (consumed > 0) {
                const dmi = (consumed / weight) * 100;
                resultElement.innerText = dmi.toFixed(2);
                
                // Visual feedback based on target
                if (dmi < 2.5) {
                    resultElement.className = "text-headline-md font-headline-md text-status-sick";
                } else {
                    resultElement.className = "text-headline-md font-headline-md text-primary";
                }
            } else {
                resultElement.innerText = "0.00";
                resultElement.className = "text-headline-md font-headline-md text-primary";
            }
        }
    </script>
