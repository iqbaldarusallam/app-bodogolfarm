<style>

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

            color: #0f5238;

            background-color: #2d6a4f;
            color: #ffffff;
            transform: scale(1.1);
        }

            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }

            max-width: 480px;

<body class="bg-surface-muted text-on-surface font-body-md selection:bg-primary-container selection:text-on-primary-container">
<!-- Top App Bar -->
<header class="bg-surface flex justify-between items-center px-gutter h-16 w-full sticky top-0 z-40 shadow-sm">
<div class="flex items-center gap-md">
<button class="p-2 -ml-2 rounded-full hover:bg-surface-container-low transition-colors active:scale-95">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<h1 class="text-headline-md font-headline-md font-bold text-primary">Catat Penimbangan</h1>
</div>
<div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center overflow-hidden border border-outline-variant">
<img class="w-full h-full object-cover" data-alt="A professional close-up of a farm worker in high-visibility gear, smiling confidently against a backdrop of a modern ranch during sunset. The lighting is warm and cinematic, emphasizing a professional yet earthy atmosphere. High contrast, sharp focus, 8k resolution, documentary style." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB2C6Cg1Q_hoJm_ITksJN9TCFGymo_ZLtYMq_uIPLQTVA8ny80FZ0319ScRsb_yh1VdqC1ySsbV98NBi8sU5LkzgRNJLfrZOpWiBPTJ4zEOEMYb7exISXg7r3lbcHL5MMnn7VgzH8dxKZTDL_9muOeB1iea8WSBaBtGpSHQwr7uW8xUXW7ozf_sm_gCNEI4k5zuPRw3dQSCMWmQD4xKuD7_j_C_u_lAappgbjrLRUkX85bdw5JNmS0F"/>
</div>
</header>
<main class="px-gutter py-lg space-y-lg pb-xxl">
<!-- Subtitle & Identity Card -->
<div class="bg-surface rounded-xl p-md shadow-sm border-l-4 border-primary">
<div class="flex justify-between items-start">
<div>
<span class="text-id-monospace font-id-monospace text-primary bg-primary-fixed px-2 py-0.5 rounded">#A-012</span>
<p class="mt-xs text-on-surface-variant text-body-md">Terakhir: <span class="font-bold text-on-surface">28.0 kg</span></p>
</div>
<div class="bg-status-active/10 text-status-active px-3 py-1 rounded-full flex items-center gap-xs">
<span class="w-2 h-2 rounded-full bg-status-active animate-pulse"></span>
<span class="text-label-md font-label-md">Sehat</span>
</div>
</div>
</div>
<!-- Growth Form -->
<form class="space-y-md" id="growthForm">
<!-- Weight Input & ADG Preview -->
<div class="space-y-sm">
<label class="text-label-md font-label-md text-on-surface-variant flex justify-between items-end" for="berat-badan">
<span>Berat Badan</span>
<span class="text-caption font-caption text-secondary">ADG Target: >100g/hari</span>
</label>
<div class="relative group">
<input autofocus="" class="w-full h-[56px] bg-surface border-2 border-outline-variant rounded-xl px-md pr-12 text-headline-md font-headline-md focus:border-primary focus:ring-0 transition-all placeholder:text-outline-variant" id="berat-badan" inputmode="decimal" name="berat-badan" placeholder="0.0" step="0.1" type="number"/>
<span class="absolute right-md top-1/2 -translate-y-1/2 text-body-lg font-bold text-on-surface-variant">kg</span>
</div>
<!-- Live Calculation Preview -->
<div class="bg-brand-surface border border-primary-fixed rounded-xl p-md flex items-center justify-between">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary">trending_up</span>
<span class="text-body-md font-medium text-primary">Pertumbuhan (ADG)</span>
</div>
<div class="text-right">
<span class="text-headline-sm font-headline-sm text-primary" id="adg-value">+156g/hari</span>
<p class="text-caption font-caption text-on-surface-variant">Sejak 14 hari lalu</p>
</div>
</div>
</div>
<div class="grid grid-cols-2 gap-md">
<!-- Date Picker -->
<div class="space-y-sm">
<label class="text-label-md font-label-md text-on-surface-variant" for="tanggal">Tanggal</label>
<div class="relative">
<input class="w-full h-[48px] bg-surface border border-outline-variant rounded-xl px-md focus:border-primary focus:ring-0 transition-all text-body-md" id="tanggal" name="tanggal" type="date" value="2023-11-20"/>
</div>
</div>
<!-- Tinggi Badan -->
<div class="space-y-sm">
<label class="text-label-md font-label-md text-on-surface-variant" for="tinggi-badan">Tinggi Badan</label>
<div class="relative">
<input class="w-full h-[48px] bg-surface border border-outline-variant rounded-xl px-md pr-10 focus:border-primary focus:ring-0 transition-all text-body-md" id="tinggi-badan" inputmode="numeric" name="tinggi-badan" placeholder="0" step="1" type="number"/>
<span class="absolute right-3 top-1/2 -translate-y-1/2 text-caption font-caption text-on-surface-variant">cm</span>
</div>
</div>
</div>
<!-- BCS Selector -->
<div class="space-y-sm">
<label class="text-label-md font-label-md text-on-surface-variant">Body Condition Score (BCS)</label>
<div class="flex justify-between items-center bg-surface-container-low p-2 rounded-full border border-outline-variant">
<div class="flex-1">
<input class="hidden bcs-radio" id="bcs1" name="bcs" type="radio" value="1"/>
<label class="flex items-center justify-center h-10 w-full rounded-full text-label-md font-label-md cursor-pointer transition-all hover:bg-surface-container-high" for="bcs1">1</label>
</div>
<div class="flex-1">
<input class="hidden bcs-radio" id="bcs2" name="bcs" type="radio" value="2"/>
<label class="flex items-center justify-center h-10 w-full rounded-full text-label-md font-label-md cursor-pointer transition-all hover:bg-surface-container-high" for="bcs2">2</label>
</div>
<div class="flex-1">
<input checked="" class="hidden bcs-radio" id="bcs3" name="bcs" type="radio" value="3"/>
<label class="flex items-center justify-center h-10 w-full rounded-full text-label-md font-label-md cursor-pointer transition-all hover:bg-surface-container-high" for="bcs3">3</label>
</div>
<div class="flex-1">
<input class="hidden bcs-radio" id="bcs4" name="bcs" type="radio" value="4"/>
<label class="flex items-center justify-center h-10 w-full rounded-full text-label-md font-label-md cursor-pointer transition-all hover:bg-surface-container-high" for="bcs4">4</label>
</div>
<div class="flex-1">
<input class="hidden bcs-radio" id="bcs5" name="bcs" type="radio" value="5"/>
<label class="flex items-center justify-center h-10 w-full rounded-full text-label-md font-label-md cursor-pointer transition-all hover:bg-surface-container-high" for="bcs5">5</label>
</div>
</div>
<div class="flex justify-between px-2 text-[10px] text-outline uppercase tracking-wider font-bold">
<span>Kurang</span>
<span>Ideal</span>
<span>Gemuk</span>
</div>
</div>
<!-- Lingkar Dada -->
<div class="space-y-sm">
<label class="text-label-md font-label-md text-on-surface-variant" for="lingkar-dada">Lingkar Dada</label>
<div class="relative">
<input class="w-full h-[48px] bg-surface border border-outline-variant rounded-xl px-md pr-10 focus:border-primary focus:ring-0 transition-all text-body-md" id="lingkar-dada" inputmode="numeric" name="lingkar-dada" placeholder="Masukkan ukuran" step="1" type="number"/>
<span class="absolute right-3 top-1/2 -translate-y-1/2 text-caption font-caption text-on-surface-variant">cm</span>
</div>
</div>
<!-- Notes -->
<div class="space-y-sm">
<label class="text-label-md font-label-md text-on-surface-variant" for="catatan">Catatan</label>
<textarea class="w-full bg-surface border border-outline-variant rounded-xl p-md focus:border-primary focus:ring-0 transition-all text-body-md placeholder:text-outline-variant" id="catatan" name="catatan" placeholder="Contoh: Kondisi bulu sehat, nafsu makan tinggi..." rows="3"></textarea>
</div>
<!-- Submit Action -->
<div class="pt-lg">
<button class="w-full h-[56px] bg-primary text-on-primary rounded-xl font-bold text-headline-sm flex items-center justify-center gap-sm shadow-lg active:scale-[0.98] transition-all" type="submit">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">save</span>
                    Simpan Rekaman
                </button>
</div>
</form>
</main>
<!-- Bottom Navigation Mock (Contextual Suppression would hide this on focused task, but kept for shell requirement if needed) -->
<nav class="fixed bottom-0 left-0 w-full bg-surface shadow-[0_-2px_10px_rgba(0,0,0,0.05)] flex justify-around items-center h-16 md:hidden">
<div class="flex flex-col items-center justify-center text-on-surface-variant px-5 py-1">
<span class="material-symbols-outlined">dashboard</span>
<span class="text-label-md font-label-md">Dashboard</span>
</div>
<div class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-full px-5 py-1 scale-90">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">pets</span>
<span class="text-label-md font-label-md">Livestock</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant px-5 py-1">
<span class="material-symbols-outlined">assessment</span>
<span class="text-label-md font-label-md">Reports</span>
</div>
</nav>
<script>
        // Micro-interaction for weight input
        const weightInput = document.getElementById('berat-badan');
        const adgDisplay = document.getElementById('adg-value');
        const initialWeight = 28.0;

        weightInput.addEventListener('input', (e) => {
            const currentWeight = parseFloat(e.target.value);
            if (!isNaN(currentWeight)) {
                // Mock calculation logic
                const diff = currentWeight - initialWeight;
                const adg = (diff * 1000) / 14; // Grams per day over 14 days
                
                if (adg >= 0) {
                    adgDisplay.textContent = `+${Math.round(adg)}g/hari`;
                    adgDisplay.parentElement.parentElement.classList.remove('bg-error-container', 'text-error');
                    adgDisplay.parentElement.parentElement.classList.add('bg-brand-surface', 'text-primary');
                } else {
                    adgDisplay.textContent = `${Math.round(adg)}g/hari`;
                    adgDisplay.parentElement.parentElement.classList.remove('bg-brand-surface', 'text-primary');
                    adgDisplay.parentElement.parentElement.classList.add('bg-error-container', 'text-error');
                }
            } else {
                adgDisplay.textContent = '--- g/hari';
            }
        });

        // Form submission animation
        document.getElementById('growthForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> Menyimpan...';
            btn.disabled = true;
            btn.classList.add('opacity-80');
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Tersimpan!';
                btn.classList.replace('bg-primary', 'bg-status-active');
                setTimeout(() => {
                    btn.innerHTML = originalContent;
                    btn.classList.replace('bg-status-active', 'bg-primary');
                    btn.disabled = false;
                    btn.classList.remove('opacity-80');
                }, 2000);
            }, 1200);
        });
    </script>
</body></html>
