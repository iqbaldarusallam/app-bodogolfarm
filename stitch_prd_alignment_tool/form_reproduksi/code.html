<body class="bg-background text-on-background font-body-md selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Top App Bar -->
<header class="w-full top-0 sticky z-40 bg-surface shadow-sm flex items-center justify-between px-gutter h-14">
<div class="flex items-center gap-3">
<button class="p-2 hover:bg-surface-container-high transition-colors rounded-full active:scale-95 duration-100">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="font-display text-headline-md text-primary">Catat Reproduksi</h1>
</div>
<button class="p-2 hover:bg-surface-container-high transition-colors rounded-full">
<span class="material-symbols-outlined text-on-surface-variant">more_vert</span>
</button>
</header>
<main class="max-w-2xl mx-auto px-gutter py-6 pb-32">
<!-- Animal Profile Header (Context Card) -->
<div class="bg-surface-container-low rounded-xl p-md mb-lg shadow-sm flex items-center gap-4">
<div class="w-16 h-16 rounded-lg bg-cover bg-center overflow-hidden flex-shrink-0" data-alt="A professional close-up photography of a healthy female cow on a lush green Indonesian farm. The lighting is bright and natural morning sun, emphasizing a clean and earthy tone typical of modern livestock management. The background is softly blurred showing other cows and wooden fencing, maintaining a focused and trustworthy professional aesthetic." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBEAJ_TNH3_-IbtPb2duMnZZC9b1ZePfdkdmxx5zfXEVzK03eEB7EXBH-D4mEDJ9ndQCgzAHvZUtqOK_83FJeSz1j9pMA0qW5xsqOM-dAtgldutg2qN4yOHK9kWiPGfViIJs5iITPUqrIiG-yV4vYddgmmsX8dHXFQaJRYm2ScbYJcmX2VsN2NhyEbr04s-3o3qPIgfLPySdV32_gdLjOsqf97QkN7oyk0-Nzz1H1uHxjoWt-UbNOuV')">
</div>
<div class="flex-grow">
<div class="flex justify-between items-start">
<span class="font-id-monospace text-primary bg-primary-fixed px-2 py-0.5 rounded text-xs">#A-012</span>
<span class="bg-status-active/10 text-status-active px-2 py-0.5 rounded-full font-label-md text-[10px] uppercase flex items-center gap-1">
<span class="w-1.5 h-1.5 bg-status-active rounded-full animate-pulse"></span> Produktif
                    </span>
</div>
<h2 class="font-headline-md mt-1">Sapi Limousin Betina</h2>
<p class="text-caption text-on-surface-variant flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]">female</span> Indukan Utama • 3.5 Tahun
                </p>
</div>
</div>
<!-- Reproduction Form -->
<form class="space-y-lg" id="reproForm">
<!-- Event Type Selector -->
<section class="space-y-sm">
<label class="font-label-md text-on-surface-variant ml-1">Jenis Kejadian</label>
<div class="grid grid-cols-2 md:grid-cols-3 gap-sm">
<button class="event-btn flex flex-col items-center justify-center p-md border-2 border-outline-variant rounded-xl hover:border-primary transition-all active:scale-95 bg-surface-container-lowest" onclick="selectEventType('heat', this)" type="button">
<span class="material-symbols-outlined text-status-sick mb-1">local_fire_department</span>
<span class="font-label-md">Birahi (Heat)</span>
</button>
<button class="event-btn flex flex-col items-center justify-center p-md border-2 border-outline-variant rounded-xl hover:border-primary transition-all active:scale-95 bg-surface-container-lowest" onclick="selectEventType('mating', this)" type="button">
<span class="material-symbols-outlined text-primary mb-1">favorite</span>
<span class="font-label-md">Kawin (Mating)</span>
</button>
<button class="event-btn flex flex-col items-center justify-center p-md border-2 border-outline-variant rounded-xl hover:border-primary transition-all active:scale-95 bg-surface-container-lowest" onclick="selectEventType('check', this)" type="button">
<span class="material-symbols-outlined text-secondary mb-1">fact_check</span>
<span class="font-label-md">Cek Bunting</span>
</button>
<button class="event-btn flex flex-col items-center justify-center p-md border-2 border-outline-variant rounded-xl hover:border-primary transition-all active:scale-95 bg-surface-container-lowest" onclick="selectEventType('birth', this)" type="button">
<span class="material-symbols-outlined text-tertiary mb-1">child_care</span>
<span class="font-label-md">Kelahiran</span>
</button>
<button class="event-btn flex flex-col items-center justify-center p-md border-2 border-outline-variant rounded-xl hover:border-primary transition-all active:scale-95 bg-surface-container-lowest" onclick="selectEventType('weaning', this)" type="button">
<span class="material-symbols-outlined text-status-sold mb-1">family_restroom</span>
<span class="font-label-md">Sapih</span>
</button>
</div>
<input id="selectedEventType" name="event_type" type="hidden"/>
</section>
<!-- Date Picker -->
<section class="space-y-sm">
<label class="font-label-md text-on-surface-variant ml-1" for="eventDate">Tanggal Kejadian</label>
<div class="relative">
<input class="w-full h-12 px-4 rounded-xl border border-outline-variant bg-surface-container-lowest focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" id="eventDate" type="date" value="2024-05-20"/>
<span class="absolute right-4 top-3 material-symbols-outlined text-outline pointer-events-none">calendar_today</span>
</div>
</section>
<!-- Conditional Section: Mating -->
<div class="form-section hidden bg-brand-surface rounded-xl p-md border border-brand-light space-y-md" id="section-mating">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-primary">info</span>
<h3 class="font-headline-sm">Detail Perkawinan</h3>
</div>
<div class="space-y-sm">
<label class="font-label-md text-on-surface-variant">Metode Perkawinan</label>
<div class="flex bg-surface-container rounded-lg p-1 gap-1">
<button class="flex-1 py-2 rounded-md font-label-md bg-white shadow-sm text-primary transition-all" type="button">Alami (Natural)</button>
<button class="flex-1 py-2 rounded-md font-label-md text-on-surface-variant hover:bg-surface-variant/50 transition-all" type="button">IB (Inseminasi Buatan)</button>
</div>
</div>
<div class="space-y-sm">
<label class="font-label-md text-on-surface-variant" for="bullId">ID Pejantan / Kode Sperma</label>
<input class="w-full h-12 px-4 rounded-xl border border-outline-variant bg-surface-container-lowest focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" id="bullId" placeholder="Contoh: #P-005 atau Kode Mani" type="text"/>
</div>
</div>
<!-- Conditional Section: Birth -->
<div class="form-section hidden bg-brand-surface rounded-xl p-md border border-brand-light space-y-md" id="section-birth">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-primary">child_friendly</span>
<h3 class="font-headline-sm">Detail Kelahiran</h3>
</div>
<div class="grid grid-cols-2 gap-md">
<div class="space-y-sm">
<label class="font-label-md text-on-surface-variant">Jumlah Anak</label>
<div class="flex items-center gap-3">
<button class="w-10 h-10 rounded-full border border-outline-variant flex items-center justify-center active:scale-90" type="button">-</button>
<span class="font-headline-md">1</span>
<button class="w-10 h-10 rounded-full border border-outline-variant flex items-center justify-center active:scale-90" type="button">+</button>
</div>
</div>
<div class="space-y-sm">
<label class="font-label-md text-on-surface-variant">Kemudahan (1-4)</label>
<div class="flex gap-2">
<button class="w-8 h-8 rounded-full bg-primary text-on-primary font-bold" type="button">1</button>
<button class="w-8 h-8 rounded-full bg-surface-container-high text-on-surface-variant font-bold" type="button">2</button>
<button class="w-8 h-8 rounded-full bg-surface-container-high text-on-surface-variant font-bold" type="button">3</button>
<button class="w-8 h-8 rounded-full bg-surface-container-high text-on-surface-variant font-bold" type="button">4</button>
</div>
</div>
</div>
<div class="space-y-sm">
<label class="font-label-md text-on-surface-variant">Tipe Kelahiran</label>
<select class="w-full h-12 px-4 rounded-xl border border-outline-variant bg-surface-container-lowest focus:ring-2 focus:ring-primary outline-none">
<option>Normal</option>
<option>Dibantu (Assisted)</option>
<option>Caesar</option>
<option>Sungsang</option>
</select>
</div>
</div>
<!-- Notes -->
<section class="space-y-sm">
<label class="font-label-md text-on-surface-variant ml-1" for="notes">Catatan Tambahan</label>
<textarea class="w-full px-4 py-3 rounded-xl border border-outline-variant bg-surface-container-lowest focus:ring-2 focus:ring-primary outline-none transition-all" id="notes" placeholder="Tambahkan observasi khusus (misal: kondisi fisik, cuaca, dll)" rows="3"></textarea>
</section>
<!-- Attachment -->
<section class="p-md border-2 border-dashed border-outline-variant rounded-xl flex flex-col items-center justify-center gap-2 hover:bg-surface-container-low transition-colors cursor-pointer group">
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors">add_a_photo</span>
<p class="font-label-md text-on-surface-variant">Lampirkan Foto Kejadian (Opsional)</p>
</section>
</form>
</main>
<!-- Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full bg-surface p-gutter pb-safe flex gap-3 shadow-[0_-4px_12px_rgba(0,0,0,0.05)] z-40">
<button class="flex-1 h-12 rounded-xl border border-primary text-primary font-headline-sm hover:bg-surface-container transition-all">Batal</button>
<button class="flex-[2] h-12 rounded-xl bg-primary text-on-primary font-headline-sm shadow-md hover:bg-primary-container active:scale-95 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[20px]">save</span> Simpan Rekam
        </button>
</div>
<!-- Micro-interaction Script -->
<script>
        function selectEventType(type, element) {
            // Reset all buttons
            document.querySelectorAll('.event-btn').forEach(btn => {
                btn.classList.remove('border-primary', 'bg-primary-fixed', 'ring-2', 'ring-primary/20');
                btn.classList.add('border-outline-variant', 'bg-surface-container-lowest');
            });

            // Highlight selected
            element.classList.remove('border-outline-variant', 'bg-surface-container-lowest');
            element.classList.add('border-primary', 'bg-primary-fixed', 'ring-2', 'ring-primary/20');
            
            // Set hidden input
            document.getElementById('selectedEventType').value = type;

            // Handle conditional sections
            document.querySelectorAll('.form-section').forEach(section => {
                section.classList.add('hidden');
            });

            const targetSection = document.getElementById('section-' + type);
            if (targetSection) {
                targetSection.classList.remove('hidden');
                // Scroll to target section for better UX
                targetSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        // Initialize with first event type check if needed
        // (Defaulting to none selected for clean start)
    </script>
</body></html>
