  </head>
<body class="bg-gradient-to-b from-surface to-surface-container-high min-h-screen flex flex-col items-center justify-center p-gutter text-on-surface antialiased">
<!-- Main Content Container (Bento/Card Style) -->
<main class="w-full max-w-md bg-surface-container-lowest rounded-[24px] shadow-lg border border-surface-variant p-xl flex flex-col gap-xl relative overflow-hidden">
<!-- Subtle decorative glow -->
<div class="absolute top-0 left-0 w-full h-32 bg-primary/5 blur-3xl rounded-full -translate-y-1/2"></div>
<!-- Header / Logo Area -->
<header class="flex flex-col items-center gap-sm text-center relative z-10 pt-md">
<!-- Animal Logo Placeholder (Using Material Icon as requested, styled to look premium) -->
<div class="w-16 h-16 bg-primary-container rounded-2xl flex items-center justify-center text-on-primary-container mb-2 shadow-sm border border-primary-container/20">
<span class="material-symbols-outlined text-4xl" data-icon="pets">pets</span>
</div>
<h1 class="text-display font-display text-primary">Bodogol Farm Livestock</h1>
<p class="text-body-md font-body-md text-on-surface-variant">Sistem Manajemen Peternakan Pintar</p>
</header>
<!-- Form Area -->
<form action="#" class="flex flex-col gap-gutter relative z-10">
<!-- Username/Email Field -->
<div class="flex flex-col gap-xs">
<label class="text-label-md font-label-md text-on-surface-variant ml-1" for="username">Username / Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant z-10" data-icon="person">person</span>
<input class="w-full h-[48px] pl-12 pr-4 bg-surface border border-outline-variant rounded-xl text-body-lg font-body-lg text-on-surface placeholder:text-outline-variant focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all outline-none shadow-sm" id="username" name="username" placeholder="Masukkan email atau ID" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs">
<label class="text-label-md font-label-md text-on-surface-variant ml-1" for="password">Kata Sandi</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant z-10" data-icon="lock">lock</span>
<input class="w-full h-[48px] pl-12 pr-12 bg-surface border border-outline-variant rounded-xl text-body-lg font-body-lg text-on-surface placeholder:text-outline-variant focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all outline-none shadow-sm" id="password" name="password" placeholder="••••••••" type="password"/>
<!-- Toggle Eye Button -->
<button class="absolute right-2 top-1/2 -translate-y-1/2 w-10 h-10 flex items-center justify-center text-outline-variant hover:text-primary transition-colors rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/30" id="togglePassword" type="button">
<span class="material-symbols-outlined" data-icon="visibility" id="eyeIcon">visibility</span>
</button>
</div>
</div>
<!-- Forgot Password (Optional utility) -->
<div class="flex justify-end">
<a class="text-label-md font-label-md text-primary hover:text-primary-fixed-variant transition-colors" href="#">Lupa Kata Sandi?</a>
</div>
<!-- Submit Button (Primary FAB-style lift on hover) -->
<button class="w-full h-[48px] mt-sm bg-primary text-on-primary rounded-xl text-headline-sm font-headline-sm flex items-center justify-center gap-2 hover:bg-on-secondary-fixed-variant active:scale-[0.98] transition-all shadow-[0_4px_12px_rgba(15,82,56,0.2)]" type="submit">
<span>Masuk</span>
<span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
</main>
<!-- Footer Caption -->
<footer class="mt-xl text-center">
<p class="text-caption font-caption text-on-surface-variant opacity-70">v1.0.0 · Bodogol Farm</p>
</footer>
<!-- Interactive Script for Password Toggle -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const toggleButton = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');

            if (toggleButton && passwordInput && eyeIcon) {
                toggleButton.addEventListener('click', function () {
                    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passwordInput.setAttribute('type', type);
                    
                    if (type === 'text') {
                        eyeIcon.textContent = 'visibility_off';
                        eyeIcon.setAttribute('data-icon', 'visibility_off');
                    } else {
                        eyeIcon.textContent = 'visibility';
                        eyeIcon.setAttribute('data-icon', 'visibility');
                    }
                });
            }
        });
    </script>
</body></html>
